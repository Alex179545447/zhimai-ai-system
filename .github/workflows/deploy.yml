name: Deploy to Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 前端构建和部署
  frontend:
    name: Frontend Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend

  # 后端构建和测试
  backend:
    name: Backend Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run tests
        run: cd backend && npm test

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.backend -t zhihui-ai-backend:${{ github.sha }} ./backend

  # Docker部署
  docker-deploy:
    name: Docker Deploy
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        run: |
          docker build -f Dockerfile.frontend -t ${{ secrets.DOCKER_USERNAME }}/zhihui-ai-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/zhihui-ai-frontend:latest

      - name: Build and push backend
        run: |
          docker build -f Dockerfile.backend -t ${{ secrets.DOCKER_USERNAME }}/zhihui-ai-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/zhihui-ai-backend:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /app/zhihui-ai
            docker-compose pull
            docker-compose up -d
